site_name: The Bookshelf of Curiosities
site_url: https://bookshelf.cabinetofcuriosities.in/
site_description: A Collection of Jesal's eclectic book interests
site_author: Jesal Mehta
copyright: Copyright &copy; 2026 Jesal Mehta. Creative Commons Attribution-NonCommercial.
nav:
  - Home: index.md
  - Interactive Projects:
      - The Golden Age of SciFi: https://bookshelf.cabinetofcuriosities.in/scifi/
      - Isaac Asimov and the Foundation Series: https://bookshelf.cabinetofcuriosities.in/asimov/
      - Agatha Christie : agatha.md  
  - Works in Progress:
      - Mapping the Hamzanama: "#"
  
extra:
  # Set your own social media below (or remove)
  social:
    # For other social icons at https://squidfunk.github.io/mkdocs-material/setup/adding-social-links/
    - icon: fontawesome/brands/instagram
      link: https://instagram.com/cabofcuriosity
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/jesal-mehta-8762404a/

theme:
  name: material
  palette:
    # scheme: slate is the dark baseline; exact hex values come from
    # extra_css below (stylesheets/bookshelf-tokens.css ->
    # stylesheets/bookshelf-material.css), which overrides Material's
    # --md-* variables to match the landing page's ink/gold/sepia
    # palette precisely. No light/dark toggle — slate is the only
    # scheme on this site, to match the landing page being dark-only.
    scheme: slate
    primary: custom
    accent: indigo
  font:
    # Matches stylesheets/bookshelf-tokens.css's --bookshelf-ff-serif/
    # --bookshelf-ff-mono — kept in sync by hand since mkdocs.yml is
    # plain YAML and can't reference a CSS custom property. Instrument
    # Serif and Syne (the landing page's other two fonts) stay
    # landing-page-only decorative faces; Material's two-slot font
    # system only has room for one text + one code face, and Libre
    # Baskerville is the right pick for long-form essay body text.
    text: Libre Baskerville
    code: Syne Mono
  icon:
    logo: material/lighthouse
  # theme.favicon needs an actual file, unlike theme.icon.logo — it
  # doesn't resolve material/<name> icon slugs, it just outputs the
  # literal string as a broken <link> href. images/favicon.svg is the
  # bundled mkdocs-material "lighthouse" MDI icon, copied in by hand.
  favicon: images/favicon.svg
  features:
    # - navigation.tabs
    # - navigation.instant
    - navigation.expand
    # - navigation.sections

markdown_extensions:
  - extra
  - smarty
  - admonition
  - codehilite:
      guess_lang: false
  - toc:
      permalink: true
  - markdown_captions
  - attr_list

plugins:
  - mkdocs-video

extra_css:
  - stylesheets/bookshelf-tokens.css
  - stylesheets/bookshelf-material.css
  - stylesheets/bookshelf-landing.css

